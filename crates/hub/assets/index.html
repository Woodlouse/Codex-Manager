<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0b0f;
        --panel: rgba(16, 18, 28, 0.9);
        --panel-strong: rgba(23, 25, 37, 0.95);
        --text: #f4f5f9;
        --muted: rgba(244, 245, 249, 0.6);
        --accent: #6cf6c2;
        --accent-2: #f4b45c;
        --danger: #ff6b6b;
        --border: rgba(255, 255, 255, 0.08);
        --shadow: rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 10% 10%, rgba(108, 246, 194, 0.18), transparent 40%),
          radial-gradient(circle at 90% 15%, rgba(244, 180, 92, 0.2), transparent 35%),
          radial-gradient(circle at 80% 85%, rgba(120, 115, 255, 0.16), transparent 40%),
          #0a0b0f;
        padding: 32px 20px 60px;
      }

      header {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin: 0 auto 32px;
        max-width: 1100px;
      }

      header h1 {
        font-family: "Unbounded", sans-serif;
        font-size: clamp(28px, 4vw, 44px);
        margin: 0;
        letter-spacing: 0.02em;
      }

      header p {
        margin: 0;
        color: var(--muted);
        max-width: 720px;
        line-height: 1.6;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }

      .grid {
        display: grid;
        gap: 20px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px 22px;
        box-shadow: 0 18px 40px var(--shadow);
        display: grid;
        gap: 14px;
      }

      .panel h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .kpi {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
      }

      .kpi-item {
        background: var(--panel-strong);
        border-radius: 14px;
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .kpi-item span {
        display: block;
        font-size: 12px;
        color: var(--muted);
      }

      .kpi-item strong {
        display: block;
        margin-top: 6px;
        font-size: 20px;
        font-family: "Unbounded", sans-serif;
      }

      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      label {
        font-size: 12px;
        color: var(--muted);
      }

      input,
      textarea,
      select {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(12, 14, 22, 0.9);
        color: var(--text);
        padding: 10px 12px;
        font-size: 13px;
        font-family: "IBM Plex Sans", sans-serif;
      }

      textarea {
        min-height: 140px;
        resize: vertical;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        color: #0a0b0f;
        background: var(--accent);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      button.secondary {
        background: var(--accent-2);
      }

      button.ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }

      button.danger {
        background: var(--danger);
        color: #0a0b0f;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.35);
      }

      .status-line {
        font-size: 12px;
        color: var(--muted);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(108, 246, 194, 0.15);
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      footer {
        margin-top: 24px;
        font-size: 12px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="pill">Account Hub</div>
      <h1>统一账号管理服务</h1>
      <p>读取账号库状态、从注册库导入、并通过注册服务发起批量注册。所有动作由 Hub 统一调度。</p>
    </header>

    <main>
      <section class="panel">
        <h2>账号状态</h2>
        <div class="kpi">
          <div class="kpi-item">
            <span>总账号数</span>
            <strong id="kpi-total">--</strong>
          </div>
          <div class="kpi-item">
            <span>Active</span>
            <strong id="kpi-active">--</strong>
          </div>
          <div class="kpi-item">
            <span>Low</span>
            <strong id="kpi-low">--</strong>
          </div>
          <div class="kpi-item">
            <span>Inactive/Other</span>
            <strong id="kpi-other">--</strong>
          </div>
        </div>
        <div class="row">
          <button id="refreshStatus" class="ghost">刷新状态</button>
          <span id="statusNote" class="status-line"></span>
        </div>
      </section>

      <div class="grid">
        <section class="panel">
          <h2>导入</h2>
          <p class="status-line">从注册数据库读取最新注册结果并导入账号库。</p>
          <div class="row">
            <button id="importRegisterDb">从注册库导入</button>
            <span id="importNote" class="status-line"></span>
          </div>
        </section>

        <section class="panel">
          <h2>注册任务</h2>
          <label>账号列表（可选，有值走普通模式）</label>
          <textarea id="accountsInput" placeholder="email----password----client_id----refresh_token"></textarea>
          <p class="status-line">默认 DuckMail 模式；未填账号列表时自动生成临时邮箱。</p>
          <div class="row">
            <div style="flex: 1; min-width: 120px;">
              <label>账号数量</label>
              <input id="duckmailCount" type="number" min="1" value="5" />
            </div>
            <div style="flex: 1; min-width: 120px;">
              <label>DuckMail 邮箱密码</label>
              <input id="duckmailMailboxPassword" type="text" value="Duck123!" />
            </div>
          </div>
          <div class="row">
            <div style="flex: 1; min-width: 120px;">
              <label>DuckMail 域名</label>
              <input id="duckmailDomain" value="duckmail.sbs" />
            </div>
            <div style="flex: 1; min-width: 120px;">
              <label>邮箱前缀</label>
              <input id="duckmailPrefix" value="duck" />
            </div>
          </div>
          <div class="row">
            <div style="flex: 1; min-width: 120px;">
              <label>OpenAI 密码</label>
              <input id="duckmailOpenAIPassword" value="Qwer1234!" />
            </div>
            <div style="flex: 1; min-width: 120px;">
              <label>轮询间隔（秒）</label>
              <input id="duckmailPollSeconds" type="number" min="1" value="3" />
            </div>
          </div>
          <div class="row">
            <div style="flex: 1; min-width: 120px;">
              <label>API 地址</label>
              <input id="duckmailBaseUrl" value="https://api.duckmail.sbs" />
            </div>
            <div style="flex: 1; min-width: 120px;">
              <label>API Key（可选）</label>
              <input id="duckmailApiKey" type="password" placeholder="dk_xxx" />
            </div>
          </div>
          <div class="row">
            <div style="flex: 1; min-width: 120px;">
              <label>并发数</label>
              <input id="workersInput" type="number" min="1" value="5" />
            </div>
            <div style="flex: 1; min-width: 120px;">
              <label>代理</label>
              <input id="proxyInput" placeholder="http://ip:port" />
            </div>
          </div>
          <div class="row">
            <label><input id="loginModeInput" type="checkbox" /> 登录刷新模式</label>
            <label><input id="skipFinishedInput" type="checkbox" checked /> 跳过已完成账号</label>
          </div>
          <div class="row">
            <button id="startRegister">开始注册</button>
            <button id="stopRegister" class="danger">停止任务</button>
          </div>
          <div class="row">
            <button id="refreshRegisterStatus" class="ghost">刷新注册状态</button>
            <span id="registerStatus" class="status-line"></span>
          </div>
        </section>
      </div>

      <footer>Hub 调用 codexmanager-service 与 auto-register-go 提供的能力。</footer>
    </main>

    <script>
      const el = (id) => document.getElementById(id);
      const statusNote = el("statusNote");
      const importNote = el("importNote");
      const registerStatus = el("registerStatus");

      async function refreshStatus() {
        statusNote.textContent = "刷新中...";
        try {
          const res = await fetch("/api/accounts");
          const data = await res.json();
          const summary = data?.summary || {};
          const byStatus = summary?.byStatus || {};
          el("kpi-total").textContent = summary.total ?? "--";
          el("kpi-active").textContent = byStatus.active ?? 0;
          el("kpi-low").textContent = byStatus.low ?? 0;
          const other =
            (summary.total ?? 0) -
            (Number(byStatus.active || 0) + Number(byStatus.low || 0));
          el("kpi-other").textContent = Number.isFinite(other) ? other : "--";
          statusNote.textContent = "已更新";
        } catch (err) {
          statusNote.textContent = `读取失败: ${err}`;
        }
      }

      async function importFromRegisterDb() {
        importNote.textContent = "导入中...";
        try {
          const res = await fetch("/api/import/register-db", { method: "POST" });
          const data = await res.json();
          if (data?.error) throw new Error(data.error);
          importNote.textContent = `完成：新增 ${data.created || 0}，更新 ${data.updated || 0}，失败 ${data.failed || 0}`;
          await refreshStatus();
        } catch (err) {
          importNote.textContent = `导入失败: ${err}`;
        }
      }

      async function startRegister() {
        registerStatus.textContent = "启动中...";
        const accounts = el("accountsInput").value.trim();
        const payload = {
          accounts,
          proxy: el("proxyInput").value || "",
          workers: Number(el("workersInput").value || 1),
          login_mode: el("loginModeInput").checked,
          skip_finished: el("skipFinishedInput").checked,
        };
        if (!accounts) {
          payload.duckmail = {
            base_url: el("duckmailBaseUrl").value || "",
            api_key: el("duckmailApiKey").value || "",
            mailbox_password: el("duckmailMailboxPassword").value || "",
            poll_seconds: Number(el("duckmailPollSeconds").value || 3),
          };
          payload.duckmail_generate = {
            domain: el("duckmailDomain").value || "",
            prefix: el("duckmailPrefix").value || "",
            count: Number(el("duckmailCount").value || 5),
            openai_password: el("duckmailOpenAIPassword").value || "",
          };
        }
        try {
          const res = await fetch("/api/register/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (data?.error) throw new Error(data.error);
          registerStatus.textContent = "已启动";
        } catch (err) {
          registerStatus.textContent = `启动失败: ${err}`;
        }
      }

      async function stopRegister() {
        registerStatus.textContent = "停止中...";
        try {
          const res = await fetch("/api/register/stop", { method: "POST" });
          const data = await res.json();
          if (data?.error) throw new Error(data.error);
          registerStatus.textContent = "已停止";
        } catch (err) {
          registerStatus.textContent = `停止失败: ${err}`;
        }
      }

      async function refreshRegisterStatus() {
        registerStatus.textContent = "读取中...";
        try {
          const res = await fetch("/api/register/status");
          const data = await res.json();
          const running = data?.running ? "运行中" : "空闲";
          registerStatus.textContent = `${running} · 成功 ${data?.success ?? 0} / 失败 ${data?.fail ?? 0}`;
        } catch (err) {
          registerStatus.textContent = `读取失败: ${err}`;
        }
      }

      el("refreshStatus").addEventListener("click", refreshStatus);
      el("importRegisterDb").addEventListener("click", importFromRegisterDb);
      el("startRegister").addEventListener("click", startRegister);
      el("stopRegister").addEventListener("click", stopRegister);
      el("refreshRegisterStatus").addEventListener("click", refreshRegisterStatus);

      refreshStatus();
      refreshRegisterStatus();
    </script>
  </body>
</html>
